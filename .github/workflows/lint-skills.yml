name: lint-skills

# Dogfooding: skillwise's own job is judging skills, so it runs its own linter
# (the mechanical entry of evaluate-skill) on every skill in this repo on each PR.
#
# HONESTY NOTE (what green here actually means): the blocking checks cover only
# frontmatter completeness and the existence of a (non-negated) exit keyword.
# Everything semantic — the six tests, and certification at the behavioral layer
# (L2, the effect gate) — is NOT run here. A green check is an entry, not a
# verdict; per docs/THEORY.md §7 the repo's own honest grade is `static_only`
# until the dogfood/ experiments run.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Shared gate copies in sync (materialized distribution, P0-1)
        run: |
          python scripts/sync-shared.py
          # --porcelain also catches a deleted-and-regenerated (untracked) copy, which git diff would miss
          drift=$(git status --porcelain -- 'skills/*/references/effect-gate.md')
          if [ -n "$drift" ]; then
            echo "$drift"
            echo '::error::references/effect-gate.md copies drifted from shared/effect-gate.md — edit the source and run scripts/sync-shared.py'
            exit 1
          fi
      - name: Lint every skill (blocking findings fail the build)
        run: |
          LINT=skills/evaluate-skill/scripts/lint_skill.py
          fail=0
          for d in skills/*/; do
            echo "::group::$d"
            python "$LINT" --check "$d" || fail=1
            echo "::endgroup::"
          done
          exit $fail
